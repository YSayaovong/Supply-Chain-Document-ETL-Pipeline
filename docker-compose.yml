services:
  airflow:
    image: apache/airflow:2.9.3-python3.10
    container_name: employee_etl_airflow
    ports:
      - "8080:8080"
    environment:
      # Airflow basics
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/project/dags"

      # Install your Python deps inside the container at startup
      _PIP_ADDITIONAL_REQUIREMENTS: >
        pandas matplotlib python-dotenv psycopg2-binary

      # Override DB env vars INSIDE docker (important)
      # Your .env can stay localhost for your host-run scripts.
      PG_HOST: "host.docker.internal"
      PG_PORT: "5432"
      PG_DB: "employee-etl-postgres-airflow"
      PG_USER: "employee_etl_user"
      PG_PASS: "ChangeThisPassword!"
      PG_TABLE: "employees"

    volumes:
      # Mount your whole repo into the container
      - ./:/opt/airflow/project

    command: airflow standalone
